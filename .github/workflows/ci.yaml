name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - docs/**
      - "**/*.md"
  workflow_dispatch:

jobs:
  quality:
    name: Format, Analyze, Test
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Version
        run: flutter --version

      - name: Dependencies
        run: flutter pub get

      - name: Format Check
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: dart analyze --fatal-infos .

      - name: Test
        run: flutter test
